    kind: Secret
    metadata:
      name: registry-auth
      namespace: argo
    type: Opaque
    stringData:
      config.json: '{"auths":{"harbor.CHANGE_ME.internal":{"username":"CHANGE_ME","password":"CHANGE_ME"}}}' # CHANGE_ME
  - apiVersion: v1
    kind: Secret
    metadata:
      name: bitbucket-ssh
      namespace: argo
    type: Opaque
    stringData:
      id_rsa: | # CHANGE_ME
        CHANGE_ME
      known_hosts: | # CHANGE_ME; pin the real Bitbucket host key
        bitbucket.CHANGE_ME.internal ssh-ed25519 CHANGE_ME
  - apiVersion: v1
    kind: Secret
    metadata:
      name: zeus-pypi-auth
      namespace: argo
    type: Opaque
    stringData:
      username: CHANGE_ME
      password: CHANGE_ME
